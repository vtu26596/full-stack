server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: home-service
          uri: lb://Micro-Client
          predicates:
            - Path=/home/**

        - id: product-service
          uri: lb://Micro-Client-1
          predicates:
            - Path=/product/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka